networks:
  innoagent:
    driver: bridge

volumes:
  ollama_data:

services:

  ollama:
    image: ollama/ollama:latest
    container_name: innoagent-ollama
    restart: unless-stopped
    networks:
      - innoagent
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # healthcheck временно убран для Windows

  model-loader:
    build:
      context: ./backend/innoagent
    dockerfile: Dockerfile.model-loader

    container_name: innoagent-model-loader

    restart: "no"

    networks:
      - innoagent

    depends_on:
      - ollama

    environment:
      MODEL_NAME: ${MODEL_NAME:-qwen2.5:0.5b}

  orchestrator:
    build:
      context: ./backend/innoagent
      dockerfile: Dockerfile
    container_name: innoagent-orchestrator
    restart: unless-stopped
    networks:
      - innoagent
    depends_on:
      - model-loader
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:0.5b}
      - OLLAMA_HOST=innoagent-ollama
      - OLLAMA_PORT=11434
      - LLM_BASE_URL=http://innoagent-ollama:11434/v1
      - API_PORT=8080