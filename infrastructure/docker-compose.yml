name: zitadel

configs:
  # Генерируется из .env при старте — отдельный файл с секретами не нужен.
  # ВАЖНО: Zitadel v4 принимает SMTP-креды только через PlainAuth subkey в YAML.
  # Через env vars (любой вариант) и через SMTP.User/Password — не работает, credentials не сохраняются.
  zitadel_secrets:
    content: |
      DefaultInstance:
        SMTPConfiguration:
          Description: ${ZITADEL_SMTP_DESCRIPTION}
          SMTP:
            Host: ${ZITADEL_SMTP_HOST}
            PlainAuth:
              User: ${ZITADEL_SMTP_USER}
              Password: ${ZITADEL_SMTP_PASSWORD}
          TLS: ${ZITADEL_SMTP_TLS}
          From: ${ZITADEL_SMTP_FROM}
          FromName: ${ZITADEL_SMTP_FROM_NAME}

  traefik_dynamic:
    content: |
      http:
        middlewares:
          strip-api:
            stripPrefix:
              prefixes:
                - /api
          zitadel-host:
            headers:
              customRequestHeaders:
                Host: "${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}"
                X-Forwarded-Host: "${ZITADEL_DOMAIN}:${ZITADEL_EXTERNALPORT}"

        services:
          zitadel-api:
            loadBalancer:
              servers:
                - url: "h2c://zitadel-api:8080"
          auth-service:
            loadBalancer:
              servers:
                - url: "http://auth:8081"

        routers:
          zitadel-alias:
            rule: "PathPrefix(`/api`)"
            entryPoints: [zitadel]
            middlewares: [strip-api, zitadel-host]
            service: zitadel-api
            priority: 200
          zitadel-canonical:
            rule: "PathPrefix(`/`)"
            entryPoints: [zitadel]
            middlewares: [zitadel-host]
            service: zitadel-api
            priority: 100
          auth-service:
            rule: "PathPrefix(`/auth/v1`)"
            entryPoints: [web, websecure]
            service: auth-service
            priority: 300
            tls: {}

services:
  proxy:
    image: ${TRAEFIK_IMAGE}
    restart: unless-stopped
    ports:
      - ${PROXY_HTTP_PUBLISHED_PORT}:80
    networks:
      - zitadel
    volumes:
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
    configs:
      - source: traefik_dynamic
        target: /etc/traefik/dynamic.yaml
    depends_on:
      zitadel-api:
        condition: service_healthy

  zitadel-api:
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION}
    restart: unless-stopped
    user: "0"
    command: start-from-init --masterkey "${ZITADEL_MASTERKEY}" --config /zitadel.yaml --config /zitadel-secrets.yaml
    env_file: .env
    environment:
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /machinekey/terraform.json
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: terraform-provisioner
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Terraform Provisioner
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_TYPE: "1"
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_FIRSTNAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_LASTNAME: Inno
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: admin@localhost
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: "false"
    volumes:
      - ./zitadel.yaml:/zitadel.yaml:ro
      - machinekey:/machinekey
    configs:
      - source: zitadel_secrets
        target: /zitadel-secrets.yaml
        mode: 0400
    healthcheck:
      test:
        - CMD
        - /app/zitadel
        - ready
        - --config
        - /zitadel.yaml
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    networks:
      - zitadel
    depends_on:
      postgres:
        condition: service_healthy

  # Runs terraform to create the Zitadel project + OIDC app; writes ZITADEL_CLIENT_ID to setup/auth.env.
  terraform-setup:
    image: hashicorp/terraform:1.12
    working_dir: /workspace
    volumes:
      - ./terraform:/workspace
      - ./setup:/setup
      - machinekey:/machinekey:ro
    extra_hosts:
      - "${ZITADEL_DOMAIN:-localhost}:host-gateway"
    environment:
      TF_IN_AUTOMATION: "1"
      TF_INPUT: "0"
      TF_VAR_zitadel_domain: "${ZITADEL_DOMAIN:-localhost}"
      TF_VAR_zitadel_port: "${ZITADEL_EXTERNALPORT:-8080}"
      TF_VAR_app_scheme: "${APP_SCHEME:-http}"
    entrypoint: ["sh", "/workspace/setup.sh"]
    depends_on:
      zitadel-api:
        condition: service_healthy
    restart: "no"
    networks:
      - zitadel

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - ./setup/auth.env
    environment:
      AUTH_JWT_PRIVATE_KEY_PATH: /run/secrets/auth_rsa_key
      ZITADEL_ISSUER: "${ZITADEL_PUBLIC_SCHEME:-http}://${ZITADEL_DOMAIN:-localhost}:${ZITADEL_EXTERNALPORT:-8080}"
    extra_hosts:
      - "${ZITADEL_DOMAIN:-localhost}:host-gateway"
    volumes:
      - ./setup:/setup:ro
    entrypoint: ["sh", "-c", "set -a; [ -f /setup/auth.env ] && . /setup/auth.env; set +a; exec ./auth-server"]
    secrets:
      - auth_rsa_key
    ports:
      - "8081:8081"
      - "9091:9091"
    networks:
      - zitadel
    depends_on:
      postgres:
        condition: service_healthy
      zitadel-api:
        condition: service_healthy
      terraform-setup:
        condition: service_completed_successfully

  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_ADMIN_USER}
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - zitadel

networks:
  zitadel:
    name: zitadel

volumes:
  postgres-data:
  machinekey:

secrets:
  auth_rsa_key:
    file: ./auth/dev-private-key.pem
