version: "3.9"

networks:
  innoagent:
    driver: bridge

volumes:
  ollama_data:
    driver: local

services:

  ollama:
    image: ollama/ollama:latest
    container_name: innoagent-ollama
    restart: unless-stopped
    networks:
      - innoagent
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  model-loader:
    image: ollama/ollama:latest
    container_name: innoagent-model-loader
    restart: on-failure
    networks:
      - innoagent
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:0.5b}
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/wait-for-model.sh:/wait-for-model.sh:ro
    entrypoint: ["sh", "/wait-for-model.sh"]

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innoagent-orchestrator
    restart: unless-stopped
    networks:
      - innoagent
    depends_on:
      ollama:
        condition: service_healthy
      model-loader:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      - MODEL_NAME=${MODEL_NAME:-qwen2.5:0.5b}
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - LLM_BASE_URL=http://ollama:11434/v1
      - API_PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
