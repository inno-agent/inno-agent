name: CI Backend

on:
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  ci-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # later will be separated into different CIs on each service
      - name: Find and test services
        run: |
          for dir in backend/*/; do
            if [ -f "$dir/go.mod" ]; then
              echo "Testing $dir"
              cd $dir
              go mod download
              go test -race ./...
              go build ./...
              cd -
            fi
          done

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      # later will be separated into different CIs on each service
      - name: Lint services
        run: |
          for dir in backend/*/; do
            if [ -f "${dir}go.mod" ]; then
              echo "Linting $dir"
              cd "$dir"
              golangci-lint run ./...
              cd -
            fi
          done
