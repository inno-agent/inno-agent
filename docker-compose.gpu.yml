name: inno-agent-gpu

services:
  ollama:
    image: ollama/ollama:0.30.11
    restart: unless-stopped
    ports:
      - "${GPU_SERVER_PORT}:11434"
    volumes:
      - ./.ollama:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-6}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-4}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-2048}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
      OLLAMA_CUDA: ${OLLAMA_CUDA:-1}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-q8_0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
