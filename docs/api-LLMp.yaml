openapi: 3.0.3
info:
  title: Core Backend -> LLM Provider 
  version: 0.1.0

servers:
  - url: http://vm-llm:8000/v1

paths:
  /chat/completions:
    post:
      summary: openAI-compatible chat completions
      operationId: chatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                messages:
                  type: array
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
                temperature:
                  type: number
                max_tokens:
                  type: integer
                stream:
                  type: boolean
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                success:
                  value: |
                    data: {"id":"cmpl-001","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"def "}}]}

                    data: {"id":"cmpl-001","object":"chat.completion.chunk","choices":[{"index":0,"delta":{"content":"add(a, b):\n    return a + b"}}]}

                    data: [DONE]