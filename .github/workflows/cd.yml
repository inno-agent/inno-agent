name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA). Defaults to main."
        required: false
        default: main

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: inno-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: identity
            context: backend
            dockerfile: backend/identity/Dockerfile
          - name: chat-api
            context: backend
            dockerfile: backend/chat-api/Dockerfile
          - name: review-api
            context: backend
            dockerfile: backend/review-api/Dockerfile
          - name: innoagent
            context: backend
            dockerfile: backend/innoagent/Dockerfile
          - name: review-consumer
            context: backend
            dockerfile: backend/review-consumer/Dockerfile
          - name: review-webhook
            context: backend
            dockerfile: backend/review-webhook/Dockerfile
          - name: issue-consumer
            context: backend
            dockerfile: backend/issue-consumer/Dockerfile
          - name: review-agent
            context: packages/review-agent
            dockerfile: packages/review-agent/Dockerfile
          # Image name must be review-sandbox to match docker-compose.yml.
          - name: review-sandbox
            context: sandbox
            dockerfile: sandbox/Dockerfile
          - name: chat-front
            context: frontend/chat-front
            dockerfile: frontend/chat-front/Dockerfile
          - name: review-front
            context: frontend/review-front
            dockerfile: frontend/review-front/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve short SHA
        id: sha
        # Fixed length, not the plain `--short` default: that picks the
        # minimum length unique among objects present in THIS clone, which
        # varies with clone depth/history size. build-and-push runs on a
        # fresh ephemeral runner (small object set); deploy runs on the
        # self-hosted runner with `clean: false`, whose workspace accumulates
        # history across every prior run (thousands of objects), so the two
        # jobs computed different-length abbreviations for the same commit —
        # e.g. 7 chars here vs 8 there — and the deploy pull 404'd on a tag
        # that was never pushed. A fixed length makes both jobs agree always.
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}:${{ steps.sha.outputs.short }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, agr01]
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          clean: false

      - name: Resolve short SHA
        id: sha
        # Fixed length so this always agrees with build-and-push's tag — see
        # the comment on that job's identical step. Must not drift back to
        # plain `--short`.
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        env:
          TAG: ${{ steps.sha.outputs.short }}
        run: ./scripts/prod.sh
