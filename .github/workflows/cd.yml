name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or SHA). Defaults to main."
        required: false
        default: main

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: inno-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: identity
            context: backend
            dockerfile: backend/identity/Dockerfile
          - name: chat-api
            context: backend
            dockerfile: backend/chat-api/Dockerfile
          - name: review-api
            context: backend
            dockerfile: backend/review-api/Dockerfile
          - name: innoagent
            context: backend
            dockerfile: backend/innoagent/Dockerfile
          - name: review-consumer
            context: backend
            dockerfile: backend/review-consumer/Dockerfile
          - name: review-webhook
            context: backend
            dockerfile: backend/review-webhook/Dockerfile
          - name: chat-front
            context: frontend/chat-front
            dockerfile: frontend/chat-front/Dockerfile
          - name: review-front
            context: frontend/review-front
            dockerfile: frontend/review-front/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Resolve short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service.name }}:${{ steps.sha.outputs.short }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, agr01]
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
          clean: false

      - name: Resolve short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy
        env:
          TAG: ${{ steps.sha.outputs.short }}
        run: ./scripts/prod.sh
