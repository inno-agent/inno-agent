// proto/identity/v1/identity.proto
syntax = "proto3";

package identity.v1;

option go_package = "github.com/inno-agent/identity/proto/identity/v1;identityv1";

service IdentityService {
  rpc ValidateToken(ValidateTokenRequest) returns (UserInfo);
}

message ValidateTokenRequest {
  string token = 1;
}

message UserInfo {
  string user_id = 1;
}
