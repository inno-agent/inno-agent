pre-commit:
  parallel: true

  commands:
  # Go
    fmt:
      root: backend
      run: gofumpt -w .

    lint:
      root: backend
      run: golangci-lint run

  # Python
    ruff-fmt:
      glob: "*.py"
      root: "ai/"
      run: ruff format --check {staged_files}

    ruff-lint:
      glob: "*.py"
      root: "ai/"
      run: ruff check {staged_files}

pre-push:
  commands:
  # Go
    test:
      root: backend
      run: go test -race ./...

    build:
      root: backend
      run: go build ./...
   
  # Python
    python-tests:
      run: pytest

    python-types:
      run: mypy ai/

    python-build:
      run: python -m build

    python-smoke:
      run: cd ~/inno-agent && python -c "import ai"
