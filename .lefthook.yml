pre-commit:
  parallel: true

  commands:
    go-fmt:
      glob: "**/*.go"
      root: backend
      run: gofumpt -d -l -e {staged_files}

    go-lint-chat:
      glob: "backend/chat-api/**/*.go"
      root: backend/chat-api
      run: golangci-lint run ./...

    go-lint-innoagent:
      glob: "backend/innoagent/**/*.go"
      root: backend/innoagent
      run: golangci-lint run ./...

    go-lint-identity:
      glob: "backend/identity/**/*.go"
      root: backend/identity
      run: golangci-lint run ./...

    python-fmt:
      glob: "**/*.py"
      root: ai
      run: uv run ruff format --check {staged_files}

    python-lint:
      glob: "**/*.py"
      root: ai
      run: uv run ruff check {staged_files}

    python-types:
      glob: "**/*.py"
      root: ai
      run: uv run mypy .

