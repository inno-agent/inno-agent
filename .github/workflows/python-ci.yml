name: Python CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'ai/**'
  push:
    branches: [main]
    paths:
      - 'ai/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai

    steps:
      - uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-path: ai/pyproject.toml

      - name: Install project and dev dependencies
        run: uv sync --group dev
        
      - name: Lint & format check
        run: |
          ruff check .
          ruff format --check .

      - name: Type check
        run: mypy .

      - name: Run tests
        run: pytest

      - name: Build & smoke test
        run: |
          python -m build
          cd ..
          python -c "import ai"
