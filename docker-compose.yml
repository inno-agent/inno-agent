name: inno-agent

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  innoagent:
    name: innoagent

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  ollama-data:
  nginx-certs:

# ─── Secrets ────────────────────────────────────────────────────────────────
secrets:
  identity_rsa_key:
    file: ./backend/identity/dev-private-key.pem

services:

  # ─── Reverse proxy (nginx) ──────────────────────────────────────────────────
  proxy:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    networks:
      - innoagent
    volumes:
      - ./infrastructure/nginx/templates:/etc/nginx/templates:ro
      - ./infrastructure/nginx/docker-entrypoint.d/10-gen-self-signed-cert.sh:/docker-entrypoint.d/05-gen-self-signed-cert.sh:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      authentik-server:
        condition: service_healthy

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_ADMIN_USER}"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - innoagent

  # ─── Redis (authentik cache/broker) ────────────────────────────────────────
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - innoagent

  # ─── Authentik IdP ──────────────────────────────────────────────────────────
  authentik-server:
    image: ${AUTHENTIK_IMAGE}
    restart: unless-stopped
    command: server
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_ADMIN_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_ADMIN_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
    volumes:
      - ./infrastructure/authentik/blueprints:/blueprints/custom:ro
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Authentik worker (applies blueprints, async tasks) ────────────────────
  authentik-worker:
    image: ${AUTHENTIK_IMAGE}
    restart: unless-stopped
    command: worker
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_ADMIN_USER}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_ADMIN_PASSWORD}
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
    volumes:
      - ./infrastructure/authentik/blueprints:/blueprints/custom:ro
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 30s
      timeout: 30s
      retries: 10
      start_period: 60s
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Identity service (JWT issuer + user context) ─────────────────────────
  identity:
    build:
      context: ./backend/identity
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AUTH_JWT_PRIVATE_KEY_PATH: /run/secrets/identity_rsa_key
      OIDC_ISSUER: "${AUTH_SCHEME:-https}://${AUTH_DOMAIN:-localhost}:${AUTH_PORT:-8080}/application/o/inno-agent/"
      OIDC_AUTHORIZE_URL: "${AUTH_SCHEME:-https}://${AUTH_DOMAIN:-localhost}:${AUTH_PORT:-8080}/application/o/authorize/"
      OIDC_CLIENT_ID: "inno-agent-web"
      OIDC_JWKS_URL: "http://authentik-server:9000/application/o/inno-agent/jwks/"
      OIDC_TOKEN_URL: "http://authentik-server:9000/application/o/token/"
    secrets:
      - identity_rsa_key
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
      authentik-server:
        condition: service_healthy

  # ─── Chat API DB migrations ────────────────────────────────────────────────
  chat-api-migrate:
    image: migrate/migrate:latest
    volumes:
      - ./backend/chat-api/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgresql://${POSTGRES_ADMIN_USER}:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/llm_chat?sslmode=disable
      - up
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Chat API ──────────────────────────────────────────────────────────────
  chat-api:
    build:
      context: ./backend/chat-api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_ADMIN_USER}:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/llm_chat?sslmode=disable
      ORCHESTRATOR_URL: http://orchestrator:8080
      AUTH_SERVICE_URL: http://identity:8081
      SERVER_PORT: "8000"
    networks:
      - innoagent
    depends_on:
      chat-api-migrate:
        condition: service_completed_successfully
      identity:
        condition: service_started
      orchestrator:
        condition: service_started

  # ─── Ollama (LLM runtime) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - innoagent
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Pull model on first boot ─────────────────────────────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    networks:
      - innoagent
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["sh", "-c", "ollama pull ${MODEL_NAME:-qwen2.5:0.5b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ─── AI Orchestrator ──────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./backend/innoagent
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - innoagent
    environment:
      MODEL_NAME: ${MODEL_NAME:-qwen2.5:0.5b}
      LLM_BASE_URL: http://ollama:11434/v1
      API_PORT: "8080"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - innoagent
