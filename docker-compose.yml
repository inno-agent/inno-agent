name: inno-agent

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  innoagent:
    name: innoagent
  # Isolated network for the exec sandbox. Deliberately separate from innoagent
  # so the sandbox cannot reach postgres/identity/orchestrator/gitflame. Only
  # review-agent bridges both networks.
  sandbox-net:
    name: sandbox-net

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  authentik-media:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
  nginx-logs:

# ─── Secrets ────────────────────────────────────────────────────────────────
secrets:
  identity_rsa_key:
    file: ./backend/identity/dev-private-key.pem

# ─── Authentik shared definition ────────────────────────────────────────────
x-authentik: &authentik
  image: ${AUTHENTIK_IMAGE}
  restart: unless-stopped
  env_file:
    - ${ENV_FILE:-.env}
  environment:
    AUTHENTIK_POSTGRESQL__HOST: postgres
    AUTHENTIK_POSTGRESQL__USER: authentik
    AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB}
    AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASSWORD}
    AUTHENTIK_REDIS__HOST: redis
    AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
    AUTHENTIK_DISABLE_UPDATE_CHECK: "true"
    AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
    AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_ADMIN_PASSWORD}
    AUTHENTIK_BOOTSTRAP_EMAIL: admin@localhost
  volumes:
    - ./infrastructure/authentik/blueprints:/blueprints/custom:ro
    - ./infrastructure/authentik/branding:/media/public/branding
  healthcheck:
    test: ["CMD", "ak", "healthcheck"]
    interval: 30s
    timeout: 30s
    retries: 10
    start_period: 60s
  networks:
    - innoagent
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ─── Reverse proxy (nginx) ──────────────────────────────────────────────────
  proxy:
    image: ${NGINX_IMAGE:-nginx:alpine}
    restart: unless-stopped
    env_file:
      - ${ENV_FILE:-.env}
    ports:
      - "80:80"
      - "443:443"
      - "8443:8443"
      - "9443:9443"
    networks:
      - innoagent
    volumes:
      - ./infrastructure/nginx/templates:/etc/nginx/templates:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx # <-- Том для логов Nginx
    depends_on:
      authentik-server:
        condition: service_healthy

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      AUTHENTIK_PG_PASSWORD: ${AUTHENTIK_PG_PASSWORD}
      IDENTITY_PG_PASSWORD: ${IDENTITY_PG_PASSWORD}
      CHAT_PG_PASSWORD: ${CHAT_PG_PASSWORD}
      REVIEW_PG_PASSWORD: ${REVIEW_PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB} -U ${POSTGRES_ADMIN_USER}"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - innoagent

  # ─── Redis (authentik cache/broker) ────────────────────────────────────────
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - redis-data:/data
    networks:
      - innoagent

  # ─── Authentik IdP ──────────────────────────────────────────────────────────
  authentik-server:
    <<: *authentik
    command: server

  # ─── Authentik worker (applies blueprints, async tasks) ────────────────────
  authentik-worker:
    <<: *authentik
    command: worker

  # ─── Identity DB migrations ───────────────────────────────────────────────
  identity-migrate:
    image: migrate/migrate:latest
    volumes:
      - ./backend/identity/internal/db/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgresql://identity:${IDENTITY_PG_PASSWORD}@postgres:5432/inno_auth?sslmode=disable
      - up
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Identity service (JWT issuer + user context) ─────────────────────────
  identity:
    build:
      context: ./backend
      dockerfile: identity/Dockerfile
    image: ghcr.io/inno-agent/identity:${TAG:-latest}
    restart: unless-stopped
    environment:
      METRICS_ENV: local
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      AUTH_JWT_PRIVATE_KEY_PATH: /run/secrets/identity_rsa_key
      AUTH_DATABASE_DSN: postgresql://identity:${IDENTITY_PG_PASSWORD}@postgres:5432/inno_auth?sslmode=disable
      OIDC_ISSUER: "${AUTH_ISSUER_URL:-https://auth.localhost}/application/o/inno-agent/"
      OIDC_CLIENT_ID: "inno-agent-web"
      OIDC_JWKS_URL: "http://authentik-server:9000/application/o/inno-agent/jwks/"
      # Refresh-token TTL for the generic /refresh flow (default 720h).
      AUTH_REFRESH_EXPIRY: ${AUTH_REFRESH_EXPIRY:-720h}
      SEED_CLIENT_ID: ${REVIEW_SERVICE_CLIENT_ID:-review-consumer}
      SEED_CLIENT_SECRET: ${REVIEW_SERVICE_CLIENT_SECRET}
      SEED_CLIENT_NAME: PR Review Bot
    secrets:
      - identity_rsa_key
    networks:
      - innoagent
    depends_on:
      identity-migrate:
        condition: service_completed_successfully
      authentik-server:
        condition: service_healthy
      jaeger:
        condition: service_started

  # ─── Chat API DB migrations ────────────────────────────────────────────────
  chat-api-migrate:
    image: migrate/migrate:latest
    volumes:
      - ./backend/chat-api/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgresql://chat:${CHAT_PG_PASSWORD}@postgres:5432/llm_chat?sslmode=disable
      - up
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Chat API ──────────────────────────────────────────────────────────────
  chat-api:
    build:
      context: ./backend
      dockerfile: chat-api/Dockerfile
    image: ghcr.io/inno-agent/chat-api:${TAG:-latest}
    restart: unless-stopped
    environment:
      METRICS_ENV: local
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      DATABASE_URL: postgresql://chat:${CHAT_PG_PASSWORD}@postgres:5432/llm_chat?sslmode=disable
      ORCHESTRATOR_URL: http://orchestrator:8080
      AUTH_SERVICE_URL: http://identity:8081
      SERVER_PORT: "8000"
    networks:
      - innoagent
    depends_on:
      chat-api-migrate:
        condition: service_completed_successfully
      identity:
        condition: service_started
      orchestrator:
        condition: service_started
      jaeger:
        condition: service_started

  # ─── Review API DB migrations ────────────────────────────────────────────
  review-api-migrate:
    image: migrate/migrate:latest
    volumes:
      - ./backend/review-api/internal/db/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgresql://review:${REVIEW_PG_PASSWORD}@postgres:5432/inno_review?sslmode=disable
      - up
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─── Review API ────────────────────────────────────────────────────────────
  review-api:
    build:
      context: ./backend
      dockerfile: review-api/Dockerfile
    image: ghcr.io/inno-agent/review-api:${TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      METRICS_ENV: local
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      ORCHESTRATOR_URL: http://orchestrator:8080
      AUTH_SERVICE_URL: ${REVIEW_AUTH_SERVICE_URL-http://identity:8081}
      GITFLAME_BASE_URL: ${GITFLAME_BASE_URL:-}
      GITFLAME_TOKEN: ${GITFLAME_TOKEN:-}
      SERVER_PORT: "8001"
      REVIEW_DATABASE_DSN: postgresql://review:${REVIEW_PG_PASSWORD}@postgres:5432/inno_review?sslmode=disable
      REVIEW_CONSUMER_CLIENT_ID: ${REVIEW_SERVICE_CLIENT_ID:-review-consumer}
    networks:
      - innoagent
    depends_on:
      review-api-migrate:
        condition: service_completed_successfully
      identity:
        condition: service_started
      orchestrator:
        condition: service_started
      jaeger:
        condition: service_started

  # ─── Ollama (LLM runtime) — local profile only ───────────────────────────
  ollama:
    profiles: ["local"]
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - innoagent
    volumes:
      # Bind-mount to host so models survive `docker compose down -v`.
      - ./.ollama:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-6}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-4}
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-2048}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-1}
      OLLAMA_CUDA: ${OLLAMA_CUDA:-1}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-q8_0}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Pull models — local profile (pulls to local Ollama) ─────────────────
  ollama-pull:
    profiles: ["local"]
    image: curlimages/curl:latest
    networks:
      - innoagent
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_API_KEY: ""
      LLM_MODELS: ${LLM_MODELS:-qwen2.5:0.5b llama3.2:1b qwen2.5-coder:1.5b}
      ROUTER_MODEL: ${ROUTER_MODEL:-fauxpaslife/arch-router:1.5b}
      OLLAMA_RETRY_MAX: ${OLLAMA_RETRY_MAX:-3}
    entrypoint: ["sh", "/scripts/ollama-pull.sh"]
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "/scripts/ollama-pull.sh", "healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: "no"

  # ─── Pull models — GPU profile (pulls to remote Ollama) ──────────────────
  ollama-pull-remote:
    profiles: ["gpu"]
    image: curlimages/curl:latest
    networks:
      - innoagent
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      LLM_MODELS: ${LLM_MODELS:-qwen2.5:0.5b llama3.2:1b qwen2.5-coder:1.5b}
      ROUTER_MODEL: ${ROUTER_MODEL:-fauxpaslife/arch-router:1.5b}
      OLLAMA_RETRY_MAX: ${OLLAMA_RETRY_MAX:-3}
    entrypoint: ["sh", "/scripts/ollama-pull.sh"]
    volumes:
      - ./scripts:/scripts:ro
    healthcheck:
      test: ["CMD", "sh", "/scripts/ollama-pull.sh", "healthcheck"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: "no"

  # ─── AI Orchestrator ──────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./backend
      dockerfile: innoagent/Dockerfile
    image: ghcr.io/inno-agent/innoagent:${TAG:-latest}
    restart: unless-stopped
    networks:
      - innoagent
    environment:
      METRICS_ENV: local
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      LLM_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}/v1
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      API_PORT: "8080"
      IDENTITY_URL: http://identity:8081
      LLM_MODELS: ${LLM_MODELS:-qwen2.5:0.5b llama3.2:1b qwen2.5-coder:1.5b}
      ROUTER_MODEL: ${ROUTER_MODEL:-fauxpaslife/arch-router:1.5b}
    depends_on:
      jaeger:
        condition: service_started

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/chat-front
      dockerfile: Dockerfile
    image: ghcr.io/inno-agent/chat-front:${TAG:-latest}
    restart: unless-stopped
    networks:
      - innoagent

  # ─── Redpanda (Kafka-compatible broker) ───────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:v26.1.11
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=0.0.0.0:9092
      - --advertise-kafka-addr=redpanda:9092
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - innoagent

  # ─── Review Consumer (webhook-driven PR reviewer) ─────────────────────────
  review-consumer:
    build:
      context: ./backend
      dockerfile: review-consumer/Dockerfile
    image: ghcr.io/inno-agent/review-consumer:${TAG:-latest}
    restart: unless-stopped
    environment:
      METRICS_ENV: local
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: gitflame.events
      KAFKA_GROUP: review-consumer
      ORCHESTRATOR_URL: http://orchestrator:8080
      ORCHESTRATOR_TOKEN: ${ORCHESTRATOR_TOKEN:-}
      REVIEW_MODEL: ${REVIEW_MODEL:-qwen2.5-coder:1.5b}
      GITFLAME_BASE_URL: ${GITFLAME_BASE_URL:-}
      GITFLAME_TOKEN: ${GITFLAME_TOKEN:-}
      # Service credentials auth: bot authenticates as itself via identity.
      IDENTITY_URL: http://identity:8081
      REVIEW_DATABASE_DSN: postgresql://review:${REVIEW_PG_PASSWORD}@postgres:5432/inno_review?sslmode=disable
      REVIEW_SERVICE_CLIENT_ID: ${REVIEW_SERVICE_CLIENT_ID:-review-consumer}
      REVIEW_SERVICE_CLIENT_SECRET: ${REVIEW_SERVICE_CLIENT_SECRET}
      BOT_GITFLAME_USERNAME: ${BOT_GITFLAME_USERNAME:-}
      ONBOARDING_URL: ${ONBOARDING_URL:-}
      REVIEW_AGENT_URL: ${REVIEW_AGENT_URL:-}
      # Shared secret; MUST match REVIEW_AGENT_AUTH_TOKEN in the review-agent service.
      REVIEW_AGENT_AUTH_TOKEN: ${REVIEW_AGENT_AUTH_TOKEN:-}
    networks:
      - innoagent
    depends_on:
      redpanda:
        condition: service_healthy
      review-api-migrate:
        condition: service_completed_successfully
      orchestrator:
        condition: service_started
      identity:
        condition: service_started
      jaeger:
        condition: service_started

  # ─── Issue Consumer (webhook-driven issue code generator) ────────────────
  issue-consumer:
    build:
      context: ./backend
      dockerfile: issue-consumer/Dockerfile
    image: ghcr.io/inno-agent/issue-consumer:${TAG:-latest}
    restart: unless-stopped
    environment:
      METRICS_ENV: local
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: gitflame.events
      KAFKA_GROUP: issue-consumer
      ORCHESTRATOR_TOKEN: ${ORCHESTRATOR_TOKEN:-}
      GITFLAME_BASE_URL: ${GITFLAME_BASE_URL:-}
      GITFLAME_TOKEN: ${GITFLAME_TOKEN:-}
      IDENTITY_URL: http://identity:8081
      REVIEW_DATABASE_DSN: postgresql://review:${REVIEW_PG_PASSWORD}@postgres:5432/inno_review?sslmode=disable
      REVIEW_SERVICE_CLIENT_ID: ${REVIEW_SERVICE_CLIENT_ID:-review-consumer}
      REVIEW_SERVICE_CLIENT_SECRET: ${REVIEW_SERVICE_CLIENT_SECRET}
      BOT_GITFLAME_USERNAME: ${BOT_GITFLAME_USERNAME:-}
      ONBOARDING_URL: ${ONBOARDING_URL:-}
      # Codegen agent (Mastra) — REQUIRED. Points at the review-agent service's
      # /codegen endpoint; the single-shot generator has been removed. The agent
      # runs the agentic loop and carries the issue author's delegated token to
      # the orchestrator (per-user attribution + onboarding gate).
      CODEGEN_AGENT_URL: ${CODEGEN_AGENT_URL:-http://review-agent:4100}
      # Shared secret; MUST match REVIEW_AGENT_AUTH_TOKEN in review-agent.
      CODEGEN_AGENT_AUTH_TOKEN: ${REVIEW_AGENT_AUTH_TOKEN:-}
    networks:
      - innoagent
    depends_on:
      redpanda:
        condition: service_healthy
      review-api-migrate:
        condition: service_completed_successfully
      orchestrator:
        condition: service_started
      identity:
        condition: service_started

  # ─── Review Agent (Mastra agent service) ─────────────────────────────────
  review-agent:
    build:
      context: ./packages/review-agent
      dockerfile: Dockerfile
    image: ghcr.io/inno-agent/review-agent:${TAG:-latest}
    restart: unless-stopped
    environment:
      GITFLAME_BASE_URL: ${GITFLAME_BASE_URL:-}
      GITFLAME_TOKEN: ${GITFLAME_TOKEN:-}
      # The agents call the orchestrator's /v1/chat/completions, carrying the
      # PR/issue author's delegated token as the bearer (per-user attribution +
      # onboarding gate). They no longer talk to Ollama directly.
      ORCHESTRATOR_URL: http://orchestrator:8080
      REVIEW_MODEL: ${REVIEW_MODEL:-qwen2.5-coder:1.5b}
      # Codegen may use a larger model than review — the agentic loop needs it.
      # Falls back to REVIEW_MODEL when unset. Point at e.g. qwen2.5-coder:32b.
      CODEGEN_MODEL: ${CODEGEN_MODEL:-}
      # Multi-step agentic codegen budget. Coupled: below the issue-consumer Go
      # client timeout (1000s) and the token freshness threshold (20m).
      CODEGEN_TIMEOUT_MS: ${CODEGEN_TIMEOUT_MS:-900000}
      REVIEW_AGENT_AUTH_TOKEN: ${REVIEW_AGENT_AUTH_TOKEN:-}
      SANDBOX_URL: http://sandbox:8080
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:-}
      SERVER_PORT: "4100"
    networks:
      - innoagent
      - sandbox-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      orchestrator:
        condition: service_started
      sandbox:
        condition: service_started

  # ─── Review Sandbox (isolated command execution for the review agent) ─────
  # Runs build/test/lint commands the review agent decides to invoke. Kept OFF
  # the innoagent network so a prompt-injected command cannot reach internal
  # services. Requires SANDBOX_TOKEN (bearer) for every /exec /write /read call.
  sandbox:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    image: ghcr.io/inno-agent/review-sandbox:${TAG:-latest}
    restart: unless-stopped
    environment:
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:-}
      SANDBOX_PORT: "8080"
    networks:
      - sandbox-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    pids_limit: 256

  # ─── Review Webhook (Slice 3: webhook → Kafka producer) ──────────────────
  review-webhook:
    build:
      context: ./backend
      dockerfile: review-webhook/Dockerfile
    image: ghcr.io/inno-agent/review-webhook:${TAG:-latest}
    restart: unless-stopped
    environment:
      METRICS_ENV: local
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      SERVER_PORT: "8002"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC: gitflame.events
      WEBHOOK_AUTHORIZATION: ${WEBHOOK_AUTHORIZATION:-}
    networks:
      - innoagent
    depends_on:
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started

  # ─── Review Frontend ──────────────────────────────────────────────────────
  review-front:
    build:
      context: ./frontend/review-front
      dockerfile: Dockerfile
    image: ghcr.io/inno-agent/review-front:${TAG:-latest}
    restart: unless-stopped
    networks:
      - innoagent

  # ─── Jaeger (Distributed Tracing) ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
      - "127.0.0.1:4317:4317"
    networks:
      - innoagent
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Loki (Log Aggregation) ──────────────────────────────────────────────
  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - innoagent
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:3100:3100"

  # ─── Promtail (Log Collector) ────────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./infrastructure/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nginx-logs:/var/log/nginx
    networks:
      - innoagent
    depends_on:
      loki:
        condition: service_healthy

  # ─── Monitoring (Prometheus + Grafana) ─────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    user: "0:0"
    entrypoint: ["/bin/sh", "/etc/alertmanager/entrypoint.sh"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    ports:
     - "127.0.0.1:9093:9093"
    volumes:
      - ./infrastructure/monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager/data
    networks:
      - innoagent

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    networks:
      - innoagent
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: https://grafana.${AUTH_DOMAIN:-localhost}
    volumes:
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - innoagent
    depends_on:
      - prometheus
      - loki

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    volumes:
      - ./infrastructure/monitoring/prometheus/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    networks:
      - innoagent

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_ADMIN_USER:-postgres}:${POSTGRES_ADMIN_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-authentik}?sslmode=disable
    networks:
      - innoagent
    depends_on:
      postgres:
        condition: service_healthy
