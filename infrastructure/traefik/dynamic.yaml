http:
  middlewares:
    strip-api:
      stripPrefix:
        prefixes:
          - /api
    zitadel-host:
      headers:
        customRequestHeaders:
          Host: "localhost:8080"
          X-Forwarded-Host: "localhost:8080"

  services:
    zitadel-api:
      loadBalancer:
        servers:
          - url: "h2c://zitadel-api:8080"

    chat-api:
      loadBalancer:
        servers:
          - url: "http://chat-api:8000"

    auth-service:
      loadBalancer:
        servers:
          - url: "http://auth:8081"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"

  routers:
    # ── Zitadel entrypoint (:8080) ──────────────────────────
    zitadel-alias:
      rule: "PathPrefix(`/api`)"
      entryPoints: [zitadel]
      middlewares: [strip-api, zitadel-host]
      service: zitadel-api
      priority: 200

    zitadel-canonical:
      rule: "PathPrefix(`/`)"
      entryPoints: [zitadel]
      middlewares: [zitadel-host]
      service: zitadel-api
      priority: 100

    # ── App entrypoint (:80) ─────────────────────────────────
    auth-service:
      rule: "PathPrefix(`/auth/v1`)"
      entryPoints: [web]
      service: auth-service
      priority: 300

    chat-api:
      rule: "PathPrefix(`/api/v1`)"
      entryPoints: [web]
      service: chat-api
      priority: 200

    frontend:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      service: frontend
      priority: 100
