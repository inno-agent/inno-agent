pre-commit:
  parallel: true

  commands:
    fmt:
      root: backend
      run: gofumpt -w .

    lint:
      root: backend
      run: golangci-lint run

    ruff-fmt:
      glob: "**/*.py"
      root: "ai/"
      run: ruff format --check {staged_files}

    ruff-lint:
      glob: "**/*.py"
      root: "ai/"
      run: ruff check {staged_files}

pre-push:
  parallel: true

  commands:
    test:
      root: backend
      run: go test -race ./...

    build:
      root: backend
      run: go build ./...

    python-tests:
      glob: "**/*.py"
      root: "ai/"
      run: uv run pytest

    python-types:
      glob: "**/*.py"
      root: "ai/"
      run: uv run mypy .

    python-build:
      glob: "**/*.py"
      root: "ai/"
      run: uv build
